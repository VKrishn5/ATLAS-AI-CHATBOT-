<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS AI</title>

<style>
body{
    background:#0a0f1f;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

header{
    background:#111a33;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#4da6ff;
}

#chat{
    height:75vh;
    overflow-y:auto;
    padding:15px;
}

.message{
    margin:10px 0;
    padding:10px;
    border-radius:10px;
}

.user{
    background:#1e3a5f;
}

.bot{
    background:#1b1b2f;
}

.bottom{
    display:flex;
    padding:10px;
    background:#111a33;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#4da6ff;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>ATLAS AI</header>

<div id="chat"></div>

<div class="bottom">
    <input type="text" id="message" placeholder="Ask ATLAS anything...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>

const API_KEY = "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";

async function sendMessage(){

    const input = document.getElementById("message");
    const text = input.value.trim();

    if(!text) return;

    const chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="message user">
            <b>You:</b> ${text}
        </div>
    `;

    input.value = "";

    try{

        const response = await fetch(
            "https://openrouter.ai/api/v1/chat/completions",
            {
                method:"POST",
                headers:{
                    "Authorization":"Bearer " + API_KEY,
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    model:"openai/gpt-4o-mini",
                    messages:[
                        {
                            role:"system",
                            content:`
You are ATLAS.
You are intelligent, professional and helpful.
Answer clearly and accurately.
`
                        },
                        {
                            role:"user",
                            content:text
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        const reply =
            data.choices[0].message.content;

        chat.innerHTML += `
            <div class="message bot">
                <b>ATLAS:</b> ${reply}
            </div>
        `;

    }catch(error){

        chat.innerHTML += `
            <div class="message bot">
                <b>ATLAS:</b> Connection Error.
            </div>
        `;
    }

    chat.scrollTop = chat.scrollHeight;
}

document.getElementById("message")
.addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        sendMessage();
    }
});

</script>

</body>
</html>
